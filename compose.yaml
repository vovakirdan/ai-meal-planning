services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: aimealplanner
      POSTGRES_USER: aimealplanner
      POSTGRES_PASSWORD: aimealplanner
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aimealplanner -d aimealplanner"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"

  bot:
    build:
      context: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
